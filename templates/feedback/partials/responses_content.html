{% load djicons i18n %}

<div x-data="{
    panelOpen: false,
    selectedIds: [],
    selectAll: false,
    deleteConfirm: false,
    deleteTarget: null,
    toggleSelect(id) {
        const idx = this.selectedIds.indexOf(id);
        if (idx > -1) this.selectedIds.splice(idx, 1);
        else this.selectedIds.push(id);
        this.selectAll = false;
    },
    toggleAll(ids) {
        if (this.selectAll) this.selectedIds = [];
        else this.selectedIds = [...ids];
        this.selectAll = !this.selectAll;
    },
    clearSelection() { this.selectedIds = []; this.selectAll = false; },
    openPanel(url) {
        htmx.ajax('GET', url, { target: '#response-panel-content', swap: 'innerHTML' });
        this.panelOpen = true;
    },
    closePanel() {
        this.panelOpen = false;
    },
    confirmDelete() {
        if (this.deleteTarget) {
            htmx.ajax('POST', this.deleteTarget.url, {
                target: '#datatable-body',
                swap: 'innerHTML',
                headers: { 'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]')?.value || '{{ csrf_token }}' }
            });
        }
        this.deleteConfirm = false;
        this.deleteTarget = null;
    }
}">

    <div class="datatable glass mt-5" id="responses-datatable">

        <!-- Toolbar -->
        <div class="datatable-toolbar">
            <div class="datatable-toolbar-start">
                <label class="input input-sm datatable-search">
                    {% icon "search-outline" %}
                    <input type="search"
                           name="q"
                           placeholder="{% trans 'Search responses...' %}"
                           value="{{ search_query|default:'' }}"
                           autocomplete="off"
                           hx-get="{% url 'feedback:responses' %}"
                           hx-target="#datatable-body"
                           hx-include="#responses-datatable"
                           hx-trigger="input changed delay:300ms, search">
                </label>
                <select name="status"
                        class="select select-sm"
                        hx-get="{% url 'feedback:responses' %}"
                        hx-target="#datatable-body"
                        hx-include="#responses-datatable"
                        hx-trigger="change">
                    <option value="">{% trans "All Status" %}</option>
                    <option value="new" {% if status_filter == 'new' %}selected{% endif %}>{% trans "New" %}</option>
                    <option value="reviewed" {% if status_filter == 'reviewed' %}selected{% endif %}>{% trans "Reviewed" %}</option>
                    <option value="actioned" {% if status_filter == 'actioned' %}selected{% endif %}>{% trans "Actioned" %}</option>
                </select>
                <select name="form"
                        class="select select-sm"
                        hx-get="{% url 'feedback:responses' %}"
                        hx-target="#datatable-body"
                        hx-include="#responses-datatable"
                        hx-trigger="change">
                    <option value="">{% trans "All Forms" %}</option>
                    {% for f in forms_list %}
                    <option value="{{ f.id }}" {% if form_filter == f.id|slugify %}selected{% endif %}>
                        {{ f.name }}
                    </option>
                    {% endfor %}
                </select>
            </div>
            <div class="datatable-toolbar-end">
                <!-- No add button for responses (they come from customers) -->
            </div>
        </div>

        <!-- Bulk Actions Bar -->
        <div class="datatable-bulk" x-show="selectedIds.length > 0" x-cloak>
            <div class="datatable-bulk-info">
                <span class="datatable-bulk-count" x-text="selectedIds.length"></span>
                <span>{% trans "selected" %}</span>
            </div>
            <div class="datatable-bulk-actions">
                <button class="datatable-bulk-btn"
                        hx-post="{% url 'feedback:bulk_action' %}"
                        hx-target="#datatable-body"
                        hx-include="#responses-datatable"
                        :hx-vals="JSON.stringify({ids: selectedIds.join(','), action: 'reviewed'})"
                        @htmx:after-request="clearSelection()">
                    {% icon "checkmark-outline" %}
                    {% trans "Mark Reviewed" %}
                </button>
                <button class="datatable-bulk-btn"
                        hx-post="{% url 'feedback:bulk_action' %}"
                        hx-target="#datatable-body"
                        hx-include="#responses-datatable"
                        :hx-vals="JSON.stringify({ids: selectedIds.join(','), action: 'actioned'})"
                        @htmx:after-request="clearSelection()">
                    {% icon "checkmark-done-outline" %}
                    {% trans "Mark Actioned" %}
                </button>
                <button class="datatable-bulk-btn datatable-bulk-btn-danger"
                        hx-post="{% url 'feedback:bulk_action' %}"
                        hx-target="#datatable-body"
                        hx-include="#responses-datatable"
                        :hx-vals="JSON.stringify({ids: selectedIds.join(','), action: 'delete'})"
                        @htmx:after-request="clearSelection()">
                    {% icon "trash-outline" %}
                    {% trans "Delete" %}
                </button>
                <button class="datatable-bulk-clear" @click="clearSelection()" title="{% trans 'Clear selection' %}">
                    {% icon "close-outline" %}
                </button>
            </div>
        </div>

        {% csrf_token %}

        <!-- Hidden state inputs -->
        <input type="hidden" name="sort" value="{{ sort_field|default:'date' }}">
        <input type="hidden" name="dir" value="{{ sort_dir|default:'desc' }}">
        <input type="hidden" name="per_page" value="{{ per_page|default:'10' }}">

        <!-- Datatable Body (HTMX swap target) -->
        <div id="datatable-body">
            {% include "feedback/partials/responses_list.html" %}
        </div>
    </div>

    <!-- Side Sheet -->
    <div class="sheet-backdrop" :class="{ 'is-open': panelOpen }" @click.self="closePanel()">
        <div class="side-sheet side-sheet-right" id="response-panel-content">
            <!-- Content loaded via HTMX -->
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div class="modal-backdrop" :data-state="deleteConfirm ? 'open' : 'closed'" @click.self="deleteConfirm = false; deleteTarget = null">
        <div class="modal modal-sm">
            <div class="modal-header">
                <h3 class="modal-title">{% trans "Delete Response" %}</h3>
                <button class="modal-close" @click="deleteConfirm = false; deleteTarget = null">
                    {% icon "close-outline" %}
                </button>
            </div>
            <div class="modal-body">
                <p class="text-sm text-base-content/70">
                    {% trans "Are you sure you want to delete this feedback response? This action cannot be undone." %}
                </p>
            </div>
            <div class="modal-footer">
                <button class="btn btn-ghost btn-sm" @click="deleteConfirm = false; deleteTarget = null">
                    {% trans "Cancel" %}
                </button>
                <button class="btn btn-sm color-error" @click="confirmDelete()">
                    {% icon "trash-outline" %}
                    {% trans "Delete" %}
                </button>
            </div>
        </div>
    </div>

</div>
