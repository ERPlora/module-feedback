{% load djicons i18n %}
<div data-back-url="{% url 'feedback:feedback_forms_list' %}" hidden></div>

<div class="p-4">
    <!-- Header -->
    <div class="flex items-center justify-between mb-6">
        <h1 class="text-2xl font-bold">{% trans "Add Feedbackform" %}</h1>
        <div class="flex gap-2">
            <a class="btn btn-ghost btn-sm"
               hx-get="{% url 'feedback:feedback_forms_list' %}"
               hx-target="#main-content-area"
               hx-push-url="true">
                {% trans "Cancel" %}
            </a>
            <button type="submit" form="add-feedback_form-form" class="btn btn-sm color-primary">
                {% icon "checkmark-outline" %}
                {% trans "Save" %}
            </button>
        </div>
    </div>

        {% if error %}
        <div class="callout callout-error">
            <div class="callout-content"><span class="callout-text">{{ error }}</span></div>
        </div>
        {% endif %}
    <!-- Form -->
    <form id="add-feedback_form-form"
          hx-post="{% url 'feedback:feedback_form_add' %}">
        {% csrf_token %}
        <div class="card mb-4">
            <div class="card-body flex flex-col gap-4">
                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Name" %}</label>
                <input type="text" name="name" class="input input-sm w-full" placeholder="{% trans 'Name' %}">
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Description" %}</label>
                <textarea name="description" class="textarea textarea-sm w-full" rows="3"></textarea>
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Form Type" %}</label>
                <select name="form_type" class="select select-sm w-full">
                <option value="">{% trans "Select..." %}</option>
                </select>
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Trigger Type" %}</label>
                <select name="trigger_type" class="select select-sm w-full">
                <option value="">{% trans "Select..." %}</option>
                </select>
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Trigger Delay Hours" %}</label>
                <input type="number" name="trigger_delay_hours" class="input input-sm w-full"  placeholder="0">
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Include Comment" %}</label>
                <label class="toggle color-success">
                <input type="checkbox" name="include_comment">
                <span class="toggle-track"><span class="toggle-thumb"></span></span>
                </label>
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Is Active" %}</label>
                <label class="toggle color-success">
                <input type="checkbox" name="is_active">
                <span class="toggle-track"><span class="toggle-thumb"></span></span>
                </label>
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Thank You Message" %}</label>
                <textarea name="thank_you_message" class="textarea textarea-sm w-full" rows="3"></textarea>
                </div>
            </div>
        </div>
    </form>
</div>
