{% load djicons i18n %}
<div data-back-url="{% url 'feedback:feedback_responses_list' %}" hidden></div>

<div class="p-4">
    <!-- Header -->
    <div class="flex items-center justify-between mb-6">
        <h1 class="text-2xl font-bold">{% trans "Edit Feedbackresponse" %}</h1>
        <div class="flex gap-2">
            <a class="btn btn-ghost btn-sm"
               hx-get="{% url 'feedback:feedback_responses_list' %}"
               hx-target="#main-content-area"
               hx-push-url="true">
                {% trans "Cancel" %}
            </a>
            <button type="submit" form="edit-feedback_response-form" class="btn btn-sm color-primary">
                {% icon "checkmark-outline" %}
                {% trans "Save" %}
            </button>
        </div>
    </div>

        {% if error %}
        <div class="callout callout-error">
            <div class="callout-content"><span class="callout-text">{{ error }}</span></div>
        </div>
        {% endif %}
    <!-- Form -->
    <form id="edit-feedback_response-form"
          hx-post="{% url 'feedback:feedback_response_edit' obj.id %}">
        {% csrf_token %}
        <div class="card mb-4">
            <div class="card-body flex flex-col gap-4">
                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Score" %}</label>
                <input type="number" name="score" class="input input-sm w-full" value="{{ obj.score }}">
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Comment" %}</label>
                <textarea name="comment" class="textarea textarea-sm w-full" rows="3">{{ obj.comment }}</textarea>
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Status" %}</label>
                <select name="status" class="select select-sm w-full">
                <option value="">---</option>
                </select>
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Reviewed By" %}</label>
                <input type="text" name="reviewed_by" class="input input-sm w-full" value="{{ obj.reviewed_by }}">
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Reviewed At" %}</label>
                <input type="datetime-local" name="reviewed_at" class="input input-sm w-full" value="{{ obj.reviewed_at }}">
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Staff Notes" %}</label>
                <textarea name="staff_notes" class="textarea textarea-sm w-full" rows="3">{{ obj.staff_notes }}</textarea>
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Related Sale" %}</label>
                <input type="text" name="related_sale" class="input input-sm w-full" value="{{ obj.related_sale }}">
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Related Appointment" %}</label>
                <input type="text" name="related_appointment" class="input input-sm w-full" value="{{ obj.related_appointment }}">
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Related Ticket" %}</label>
                <input type="text" name="related_ticket" class="input input-sm w-full" value="{{ obj.related_ticket }}">
                </div>
            </div>
        </div>
    </form>
</div>
